<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio Derecho</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="gatekeeper" class="gatekeeper-overlay">
        <div class="gatekeeper-box">
            <h2> Samy <span></span></h2>
            <p>Ingresa la contraseña.</p>
            <form id="gatekeeperForm" style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px;">
                <input type="password" id="gatekeeperPassword" placeholder="Contraseña de acceso" required style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--chambray); background-color: var(--rich-black); color: var(--text-light); text-align: center; font-size: 16px;">
                <button type="submit" class="auth-btn" style="background-color: var(--chambray); color: var(--rich-black); font-weight: bold; padding: 12px;">Entrar</button>
            </form>
            <p id="gatekeeperError" style="color: #ff5c5c; font-size: 14px; margin-top: 10px; display: none; font-weight: bold;">⚠️ Contraseña incorrecta. Inténtalo de nuevo.</p>
        </div>
    </div>

    <header class="app-header">
        <div class="header-container">
            <h1> Derecho <span></span></h1>
            <div class="header-actions">
                <button id="adminNewSemesterBtn" class="auth-btn" style="display: none; background-color: var(--clay);">🔧 Configurar</button>
                <button id="loginBtn" class="auth-btn">Iniciar Sesión (Admin)</button>
            </div>
        </div>
    </header>

    <div class="app-layout">
        <aside class="semester-sidebar">
            <div class="sidebar-header">
                <h2>Semestres</h2>
            </div>
            <div id="semesters-container" class="semesters-feed"></div>
        </aside>

        <main class="content-area">
            <div class="content-header-row">
                <h2 id="current-selection-title">Asignaturas</h2>
                <div class="search-box">
                    <input type="text" id="searchBar" placeholder="🔍 Buscar materia o archivo...">
                </div>
            </div>
            <div id="subjects-accordion-container" class="subjects-grid"></div>
        </main>
    </div>

    <div id="adminStructureModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Configuración del Repositorio</h3>
                <span class="close-btn" id="closeAdminStructBtn">&times;</span>
            </div>
            <div class="modal-tabs-body" style="padding: 20px; display: flex; flex-direction: column; gap: 20px; max-height: 75vh; overflow-y: auto;">
                <form id="addSemesterForm" style="display: flex; flex-direction: column; gap: 10px; border-bottom: 1px dashed var(--clay); padding-bottom: 15px;">
                    <label>Agregar Semestre:</label>
                    <input type="text" id="newSemesterName" placeholder="Ej: Primer Semestre" required style="width:100%; padding:10px; background: var(--rich-black); color:white; border:1px solid var(--clay); border-radius: 6px;">
                    <button type="submit" class="auth-btn" style="background-color: var(--chambray); color: var(--rich-black); font-weight: bold;">Crear Semestre</button>
                </form>

                <div style="display: flex; flex-direction: column; gap: 8px; border-bottom: 1px dashed var(--clay); padding-bottom: 15px;">
                    <label>Eliminar Semestres:</label>
                    <div id="admin-semesters-list" style="display: flex; flex-direction: column; gap: 6px; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px;"></div>
                </div>

                <form id="addSubjectForm" style="display: flex; flex-direction: column; gap: 10px; border-bottom: 1px dashed var(--clay); padding-bottom: 15px;">
                    <label>Asignar a Semestre:</label>
                    <select id="selectSemesterForSubject" required style="width:100%; padding:10px; background: var(--rich-black); color:white; border:1px solid var(--clay); border-radius: 6px;"></select>
                    <label>Nombre de la Materia:</label>
                    <input type="text" id="newSubjectName" placeholder="Ej: Derecho Civil I" required style="width:100%; padding:10px; background: var(--rich-black); color:white; border:1px solid var(--clay); border-radius: 6px;">
                    <button type="submit" class="auth-btn" style="background-color: var(--chambray); color: var(--rich-black); font-weight: bold;">Crear Materia</button>
                </form>

                <form id="changeAccessPasswordForm" style="display: flex; flex-direction: column; gap: 10px;">
                    <label>Modificar Contraseña General de Entrada:</label>
                    <input type="text" id="newAccessPassword" placeholder="Nueva contraseña de acceso" required style="width:100%; padding:10px; background: var(--rich-black); color:white; border:1px solid var(--clay); border-radius: 6px;">
                    <button type="submit" id="submitChangePassBtn" class="auth-btn" style="background-color: var(--chambray); color: var(--rich-black); font-weight: bold;">Actualizar Clave</button>
                </form>
            </div>
        </div>
    </div>

    <div id="adminUploadModal" class="modal">
        <div class="modal-content" style="max-width: 450px; height: auto;">
            <div class="modal-header">
                <h3>Subir Documento PDF</h3>
                <span class="close-btn" id="closeUploadModalBtn">&times;</span>
            </div>
            <form id="uploadForm" style="padding: 20px; display: flex; flex-direction: column; gap: 15px;">
                <div>
                    <label>Materia Destino:</label>
                    <select id="selectSubjectForFile" required style="width:100%; padding:10px; margin-top:5px; background: var(--rich-black); color: var(--text-light); border:1px solid var(--clay); border-radius:6px;">
                        <option value="">-- Selecciona la materia --</option>
                    </select>
                </div>
                
                <div style="margin-top: 5px; text-align: center; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px dashed var(--clay);">
                    <label for="inputFile" style="display: inline-block; padding: 10px 20px; cursor: pointer; font-size: 14px; background-color: var(--chambray); color: var(--rich-black); border-radius: 6px; font-weight: bold; transition: background 0.2s;">
                        📁 Examinar Documentos
                    </label>
                    <input type="file" id="inputFile" accept=".pdf" required style="position: absolute; opacity: 0; width: 1px; height: 1px; overflow: hidden;">
                    <p id="file-name-display" style="font-size: 13px; margin-top: 10px; margin-bottom: 0; color: var(--bisque); font-style: italic; word-break: break-all; min-height: 18px;"></p>
                </div>

                <button type="submit" id="submitUploadBtn" class="auth-btn" style="background: var(--chambray); color: var(--rich-black); font-weight: bold; padding: 12px; margin-top: 10px;">Subir a la Nube</button>
            </form>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content" style="max-width: 380px; height: auto;">
            <div class="modal-header">
                <h3>Acceso Administrador</h3>
                <span class="close-btn" id="closeLoginModalBtn">&times;</span>
            </div>
            <form id="loginForm" style="padding: 20px; display: flex; flex-direction: column; gap: 15px;">
                <div>
                    <label>Correo Electrónico:</label>
                    <input type="email" id="loginEmail" required style="width:100%; padding:10px; margin-top:5px; background: var(--rich-black); color:white; border:1px solid var(--clay); border-radius: 6px;">
                </div>
                <div>
                    <label>Contraseña:</label>
                    <input type="password" id="loginPassword" required style="width:100%; padding:10px; margin-top:5px; background: var(--rich-black); color:white; border:1px solid var(--clay); border-radius: 6px;">
                </div>
                <button type="submit" class="auth-btn" style="width: 100%; padding: 12px; background-color: var(--chambray); color: var(--rich-black); font-weight: bold;">Ingresar</button>
            </form>
        </div>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content viewer-content">
            <div class="modal-header">
                <h3 id="modal-title">Visualizador Seguro</h3>
                <span class="close-btn" id="closeViewModalBtn">&times;</span>
            </div>
            <div class="viewer-wrapper">
                <div id="iframeShield"></div>
                <div id="pdfContainer" class="canvas-container"></div>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal" style="z-index: 2000;">
        <div class="modal-content" style="max-width: 400px; height: auto; text-align: center;">
            <div class="modal-header">
                <h3 id="confirmModalTitle">⚠️ Confirmación</h3>
            </div>
            <div style="padding: 25px 20px; display: flex; flex-direction: column; gap: 20px;">
                <p id="confirmModalMessage" style="color: var(--bisque); font-size: 15px; line-height: 1.5;"></p>
                <div style="display: flex; gap: 12px; justify-content: center;">
                    <button id="confirmCancelBtn" class="auth-btn" style="border-color: var(--clay); color: var(--bisque);">Cancelar</button>
                    <button id="confirmAcceptBtn" class="auth-btn" style="background-color: #ff5c5c; border-color: #ff5c5c; color: white;">Eliminar permanentemente</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
